<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="wax" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#8a2830"/>
      <stop offset="45%" stop-color="#701d21"/>
      <stop offset="78%" stop-color="#5a1518"/>
      <stop offset="100%" stop-color="#3a0e12"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6b8"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#c9a050"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#701d21" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Irregular wax edge -->
  <ellipse cx="100" cy="100" rx="96" ry="94" fill="url(#wax)" filter="url(#shadow)" transform="rotate(-3 100 100)"/>
  <ellipse cx="100" cy="100" rx="88" ry="86" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Gold monogram E&S -->
  <text x="100" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-style="italic" fill="url(#gold)" letter-spacing="-2">E&amp;S</text>
</svg>
